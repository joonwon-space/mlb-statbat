name: Deploy to Mac Mini

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, deploy]
    timeout-minutes: 20
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
      DOCKER_CONFIG: /tmp/docker-config-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Docker (disable keychain)
        run: |
          mkdir -p /tmp/docker-config-ci
          echo '{"auths":{}}' > /tmp/docker-config-ci/config.json

      - name: Create .env from secrets
        run: |
          cat > .env << 'EOF'
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDFLARED_TOKEN=${{ secrets.CLOUDFLARED_TOKEN }}
          EOF

      - name: Build and deploy
        run: |
          docker compose pull db cloudflared
          docker compose build --parallel backend frontend
          docker compose up -d --remove-orphans

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "Backend is healthy!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 5
          done
          curl -sf http://localhost:8001/health || exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 15); do
            if curl -sf -o /dev/null http://localhost:3001 2>&1; then
              echo "Frontend is healthy!"
              break
            fi
            sleep 2
          done
          curl -s -o /dev/null -w "Frontend: HTTP %{http_code}\n" http://localhost:3001

      - name: Show container status
        run: docker compose ps

      - name: Cleanup old images
        if: success()
        run: docker image prune -f
