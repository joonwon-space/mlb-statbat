name: Deploy to Mac Mini

on:
  workflow_dispatch: # 수동 실행만 허용 (self-hosted runner 준비 후 push 트리거 추가 예정)
  # push:
  #   branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDFLARED_TOKEN=${{ secrets.CLOUDFLARED_TOKEN }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          EOF

      - name: Build and deploy
        run: |
          docker compose pull db cloudflared
          docker compose build --parallel backend frontend
          docker compose up -d --remove-orphans

      - name: Wait for services
        run: |
          echo "Waiting for backend health check..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is healthy!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 5
          done

      - name: Verify deployment
        run: |
          echo "=== Container status ==="
          docker compose ps

          echo ""
          echo "=== Backend health ==="
          curl -sf http://localhost:8000/health || echo "Backend not responding"

          echo ""
          echo "=== Frontend check ==="
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "Frontend not responding"

      - name: Cleanup old images
        if: success()
        run: docker image prune -f
